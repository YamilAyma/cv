name: Render CV

on:
  push:
    branches:
      - main
    paths:
      - "cv-yamil-ayma-rendercv.yaml"
      - ".github/workflows/render-cv.yml"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv pip install --system "rendercv[full]"

      - name: Render CV
        run: |
          rendercv render cv-yamil-ayma-rendercv.yaml

      - name: Upload PDF to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest CV Build
          files: |
            rendercv_output/Anthony_Yamil_Ayma_Leon_CV.pdf
          body: |
            Generado automáticamente por GitHub Actions.
            Última actualización: ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
