name: Render CV

on:
  push:
    branches:
      - main
    paths:
      - "cv-yamil-ayma-rendercv.yaml"
      - ".github/workflows/render-cv.yml"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv pip install --system "rendercv[full]"

      - name: Render CV
        run: |
          rendercv render cv-yamil-ayma-rendercv.yaml

      - name: Prepare HTML for Pages
        run: |
          mv rendercv_output/Anthony_Yamil_Ayma_Leon_CV.html rendercv_output/index.html

      - name: Upload PDF to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest CV Build
          files: |
            rendercv_output/Anthony_Yamil_Ayma_Leon_CV.pdf
            rendercv_output/index.html
          body: |
            Generado automáticamente por GitHub Actions.
            Última actualización: ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './rendercv_output'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: render
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
